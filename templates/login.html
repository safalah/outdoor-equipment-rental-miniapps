<!DOCTYPE html>
<html>
<head>
<title>Login - Arunika Outdoor</title>

<style>

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #E6EFE6, #C9DCC2, #B7CDA7);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  background:white;
  padding:40px;
  border-radius:12px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:center;
}

h1{
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#F57C00;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#EF6C00;
}

.back{
  display:block;
  margin-top:15px;
  color:#555;
  text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🏕️ Login</h1>

{% if error %}
<p style="color: red; background: #ffebee; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px;">{{ error }}</p>
{% endif %}

<form method="post">
<input name="userid" type="text" placeholder="UserID" required>
<input name="password" type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<a class="back" href="{{ url_for('menu_awal') }}">Back</a>

</div>

</body>
</html>
