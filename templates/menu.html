<!DOCTYPE html>
<html>
<head>
<title>Arunika Outdoor Rental</title>

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #E6EFE6, #C9DCC2, #B7CDA7);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container{
  text-align:center;
  background:white;
  padding:40px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  width:320px;
}

h1{
  margin-bottom:10px;
}

p{
  color:gray;
  margin-bottom:30px;
}

button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.register{
  background:#4CAF50;
  color:white;
}

.login{
  background:#2196F3;
  color:white;
}

button:hover{
  transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>🌿 ARUNIKA OUTDOOR</h1>
<h3>RENTAL APP 🏕️</h3>

<p>Explore the peaks, gear up with us!</p>

<form action="/register" method="get">
<button class="register">Register</button>
</form>

<form action="/login" method="get">
<button class="login">Login</button>
</form>

</div>

</body>
</html>
